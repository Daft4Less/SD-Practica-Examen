server.port=5000

# H2 en archivo — ruta relativa al directorio de ejecución
# Localmente crea ./data/inventario.mv.db
# En Docker crea /app/data/inventario.mv.db (ajustable con DB_PATH)
spring.datasource.url=${DB_PATH:jdbc:h2:file:./data/inventario}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Fechas como string ISO-8601 en lugar de array numérico
spring.jackson.serialization.write-dates-as-timestamps=false

# Consola H2 (solo desarrollo — desactivar en producción)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
